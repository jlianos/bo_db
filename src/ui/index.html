<!DOCTYPE html>
<html lang="en">

<head>
    <title>Menu Builder</title>
    <link rel="stylesheet" href="./app.css">
</head>

<body>
    <div class="app">
        <aside class="panel">
            <h2>Menus</h2>
            <select id="menuSelect"></select>

            <h2>Available Items</h2>
            <div id="availableItems" class="list"></div>
        </aside>

        <main class="panel">
            <h2>Menu Builder</h2>
            <div id="menuTree" class="tree drop-zone"></div>
        </main>

        <aside class="panel">
            <h2>Preview</h2>
            <button type="button" onclick="refreshPreview()">Refresh</button>
            <pre id="preview"></pre>
        </aside>
    </div>

    <script src="./app.js"></script>
</body>

</html>
